<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratum XR | New Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #202124;
            --bg-surface: #2d2e30;
            --bg-header: #2d2e30;
            --text-primary: #e8eaed;
            --text-secondary: #bdc1c6;
            --border: #5f6368;
            --border-light: #3c4043;
            --primary: #81c995;
            --primary-dark: #33a868;
            --primary-light: #107c41;
            --secondary: #8ab4f8;
            --danger: #f28b82;
            --shadow: rgba(0, 0, 0, 0.5);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --glass-bg: rgba(32, 33, 36, 0.75);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-primary);
        }

        #earth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
            background: radial-gradient(circle at center, #1a2a1a 0%, #000000 100%);
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-section img {
            height: 56px;
            margin-bottom: 16px;
            border-radius: 6px;
        }

        .logo-section h1 {
            font-size: 1.75em;
            margin: 0;
            font-weight: 600;
        }

        .logo-section p {
            color: var(--text-secondary);
            font-size: 0.95em;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        .form-group input {
            width: 100%;
            background: rgba(60, 64, 67, 0.4);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 13px 14px 13px 42px;
            color: #fff;
            font-size: 1em;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(60, 64, 67, 0.7);
            box-shadow: 0 0 0 2px rgba(129, 201, 149, 0.2);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
        }

        .btn-auth {
            width: 100%;
            background: var(--primary-light);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-auth:hover {
            background-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 124, 65, 0.4);
        }

        .error-msg {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.9em;
            background: rgba(242, 139, 130, 0.15);
            color: #f28b82;
            border: 1px solid rgba(242, 139, 130, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
    <style>
        :root {
            --bg-body: #1f242b !important;
            --bg-surface: #2c323a !important;
            --bg-header: #2a3038 !important;
            --text-primary: #dde2e8 !important;
            --text-secondary: #9ca6b2 !important;
            --border: #454d58 !important;
            --border-light: #3f4752 !important;
            --primary: #4f86b8 !important;
            --primary-dark: #3f6f98 !important;
            --primary-light: #4f86b8 !important;
            --glass-bg: #2b3139 !important;
        }
        .auth-card { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; border-radius: 4px !important; box-shadow: 0 4px 10px rgba(0,0,0,0.35) !important; }
        .form-group input, .btn-auth, .toggle-password { border-radius: 2px !important; }
        .btn-auth:hover { transform: none !important; box-shadow: none !important; }
        #earth-container { opacity: 0.25 !important; background: radial-gradient(circle at center, #232a33 0%, #15191f 100%) !important; }
    </style>
</head>

<body>
    <div id="earth-container"></div>

    <div class="auth-card">
        <div class="logo-section">
            <img src="/static/logo.jpeg" alt="Stratum XR">
            <h1>Set New Password</h1>
            <p>Enter your new secure password</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/reset-password">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="otp" value="{{ otp }}">

            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)"
                        tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-save"></i> Save Password
            </button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/static/earth.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
